<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4f4f4f" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
    <clipPath id="window">
      <rect x="80" y="75" width="1040" height="480" rx="16"/>
    </clipPath>
  </defs>

  <!-- Fondo de página con rejilla -->
  <rect width="1200" height="630" fill="#010409"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ventana del terminal -->
  <rect x="80" y="75" width="1040" height="480" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <g clip-path="url(#window)">
    <!-- Barra de título -->
    <rect x="80" y="75" width="1040" height="56" fill="#161b22"/>
    <line x1="80" y1="131" x2="1120" y2="131" stroke="#30363d" stroke-width="2"/>
    <circle cx="122" cy="103" r="9" fill="#ff5f56"/>
    <circle cx="152" cy="103" r="9" fill="#ffbd2e"/>
    <circle cx="182" cy="103" r="9" fill="#27c93f"/>
    <text x="600" y="110" text-anchor="middle" font-family="Noto Sans Mono, monospace" font-size="20" fill="#8b949e">daniel@portfolio — zsh — 120x40</text>
  </g>

  <!-- Contenido del terminal -->
  <g font-family="Noto Sans Mono, monospace">
    <!-- prompt: whoami (ancho de carácter a 28px: 16.8) -->
    <text x="140" y="215" font-size="28" fill="#7ee787">daniel@portfolio</text>
    <text x="425.6" y="215" font-size="28" fill="#8b949e">~$</text>
    <text x="476" y="215" font-size="28" fill="#e6edf3">whoami</text>

    <!-- nombre -->
    <text x="140" y="310" font-size="76" font-weight="700" fill="#e6edf3">Daniel Aparisi</text>

    <!-- rol -->
    <text x="140" y="368" font-size="30" fill="#7ee787">&gt;</text>
    <text x="176" y="368" font-size="30" fill="#58a6ff">Estudiante de Ingeniería de Software · UPM</text>

    <!-- prompt: stack -->
    <text x="140" y="452" font-size="28" fill="#7ee787">daniel@portfolio</text>
    <text x="425.6" y="452" font-size="28" fill="#8b949e">~$</text>
    <text x="476" y="452" font-size="28" fill="#e6edf3">cat stack.json</text>
    <text x="140" y="500" font-size="26" fill="#8b949e">Astro · TypeScript · JavaScript · React · Java</text>

    <!-- cursor -->
    <rect x="722" y="428" width="16" height="30" fill="#7ee787"/>
  </g>
</svg>
